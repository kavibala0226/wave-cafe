<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart — The Wave Cafe</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">
</head>
<body class="page-enter">

<nav class="navbar">
  <div class="container nav-inner">
    <a href="/index.html" class="nav-logo"><span class="wave-icon">🌊</span> The Wave Cafe</a>
    <div class="nav-links">
      <a href="/index.html" class="nav-link">Home</a>
      <a href="/menu.html"  class="nav-link">Menu</a>
      <a href="/cart.html"  class="nav-link active">Cart</a>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle"><span class="theme-icon">🌙</span></button>
      <button class="nav-login-btn btn btn-sm btn-outline open-login">Login</button>
      <span class="nav-user-chip" style="display:none;font-size:0.85rem;font-weight:600;color:var(--primary);"></span>
      <button class="nav-logout-btn btn btn-sm btn-ghost" style="display:none;">Logout</button>
      <button class="cart-btn" onclick="openCartSidebar()">🛒<span class="cart-badge" style="display:none;">0</span></button>
      <button class="hamburger"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>

<div class="mobile-nav">
  <a href="/index.html" class="nav-link">Home</a>
  <a href="/menu.html"  class="nav-link">Menu</a>
  <a href="/cart.html"  class="nav-link active">Cart</a>
</div>

<div class="cart-overlay"></div>
<div class="cart-sidebar">
  <div class="cart-header"><h3>Your Cart</h3><div class="cart-close">X</div></div>
  <div class="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-summary"></div>
    <a href="/checkout.html" class="btn btn-primary w-full">Checkout</a>
  </div>
</div>

<div class="page-hero">
  <div class="container">
    <h1>Your Cart</h1>
    <p>Review your items before checkout</p>
  </div>
</div>

<div class="cart-page">
  <div class="container">
    <div id="cartEmpty" style="display:none;flex-direction:column;align-items:center;justify-content:center;padding:100px 24px;text-align:center;">
      <div style="font-size:5rem;margin-bottom:24px;">🛒</div>
      <h2 style="font-family:var(--font-display);font-size:1.75rem;margin-bottom:12px;">Your cart is empty</h2>
      <p style="color:var(--text-secondary);margin-bottom:28px;">Add something delicious to get started!</p>
      <a href="/menu.html" class="btn btn-primary btn-lg">Browse Menu</a>
    </div>

    <div class="cart-page-grid" id="cartSection" style="display:none;">
      <div class="cart-items-section">
        <div class="section-header">
          <h2>Items in Cart</h2>
          <button id="clearCartBtn" class="btn btn-sm" style="background:rgba(255,71,87,0.1);color:var(--danger);">Clear All</button>
        </div>
        <div id="cartPageItems"></div>
      </div>

      <div class="order-summary-card" id="summaryCard" style="display:none;">
        <h3>Order Summary</h3>
        <div id="orderSummary"></div>
        <div class="divider"></div>
        <div style="display:flex;gap:8px;margin-bottom:20px;">
          <input class="form-input" type="text" placeholder="Promo code" style="flex:1;padding:10px 14px;">
          <button class="btn btn-outline btn-sm">Apply</button>
        </div>
        <button id="checkoutBtn" class="btn btn-primary w-full btn-lg">Proceed to Checkout</button>
        <a href="/menu.html" class="btn btn-ghost w-full" style="margin-top:10px;justify-content:center;">+ Add More Items</a>
        <div style="background:rgba(0,200,150,0.08);border:1px solid rgba(0,200,150,0.2);border-radius:var(--radius-sm);padding:12px;margin-top:16px;font-size:0.825rem;color:var(--success);">
          Estimated delivery: 25-35 minutes
        </div>
      </div>
    </div>
  </div>
</div>

<footer class="footer" style="margin-top:60px;">
  <div class="container footer-bottom" style="border-top:none;">
    <span>2024 The Wave Cafe</span>
    <a href="/admin/admin-login.html" style="color:var(--primary);">Admin</a>
  </div>
</footer>

<script src="/js/main.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/cart.js"></script>
</body>
</html>
